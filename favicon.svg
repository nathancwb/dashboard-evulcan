<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(129,140,248,0.25)" stroke-width="0.75"/>
  <!-- E / bar chart mark: top bar -->
  <rect x="7" y="8" width="18" height="3.5" rx="1.75" fill="url(#grad)"/>
  <!-- E / bar chart mark: middle bar (shorter = negative space creates E) -->
  <rect x="7" y="14.25" width="12" height="3.5" rx="1.75" fill="url(#grad)" opacity="0.8"/>
  <!-- E / bar chart mark: bottom bar -->
  <rect x="7" y="20.5" width="18" height="3.5" rx="1.75" fill="url(#grad)"/>
</svg>
